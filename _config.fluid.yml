# Fluid 主题配置
# 文档: https://hexo.fluid-dev.com/docs/guide/

# 导航栏配置
navbar:
  # 博客标题
  blog_title: "WANQIANG.WANG"
  
  # 菜单项
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }

# Mermaid 流程图配置
# 基于 mermaid-js，具体请见：https://hexo.fluid-dev.com/docs/guide/#mermaid-流程图
mermaid:
  # 开启后文章默认可用，自定义页面如需使用，需在 Front-matter 中指定 `mermaid: true`
  enable: true
  
  # 开启后，只有在文章 Front-matter 里指定 `mermaid: true` 才会在文章页启动公式转换，以便在页面不包含公式时提高加载速度
  specific: false
  
  # Mermaid 配置选项
  # See: http://mermaid-js.github.io/mermaid/
  options:
    theme: 'forest'
    startOnLoad: true
    flowchart:
      curve: 'linear'
    sequence:
      diagramMarginX: 50
      diagramMarginY: 10
      actorMargin: 50
    gantt:
      titleTopMargin: 25
      barHeight: 20
      barGap: 4

# 代码块配置
code:
  # 是否开启复制代码的按钮
  copy_btn: true
  
  # 代码语言
  language:
    enable: true
    default: "TEXT"
  
  # 代码高亮
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github gist"
      style_dark: "dark"

# 页面配置
post:
  # 文章页配置
  meta:
    author:
      enable: true
    date:
      enable: true
      format: "relative"  # 格式: relative | absolute
    wordcount:
      enable: true
    min2read:
      enable: true
    update_date:
      enable: true
      format: "relative"
  
  # 评论配置
  comments:
    enable: true
    # 评论插件类型
    # Options: utterances | disqus | gitalk | valine | waline | changyan | livere | remark42 | twikoo | cusdis | giscus | discuss
    type: giscus

# 页脚配置
footer:
  # 页脚内容
  content: '© 2024 WANQIANG.WANG | 基于 <a href="https://hexo.io" target="_blank" rel="nofollow noopener">Hexo</a> 和 <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener">Fluid</a> 主题'
  
  # 统计信息
  statistics:
    enable: true
    pv_format: "总访问量 {} 次"
    uv_format: "总访客数 {} 人"

# 主题颜色配置
color:
  # 导航栏背景色
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f3144"
  
  # 导航栏字体色
  navbar_text_color: "#fff"
  navbar_text_color_dark: "#d0d0d0"
  
  # 全局字体色
  text_color: "#3c4858"
  text_color_dark: "#c4c6c9"

# 首页配置
index:
  # 横幅图片
  banner_img: /img/default.png
  
  # 横幅标题
  banner_title: "WANQIANG.WANG"
  
  # 横幅副标题
  banner_subtitle: "Stay hungry, stay foolish."

  # 首页打字机副标题
  slogan:
    enable: true
    text: "Stay hungry, stay foolish."

# 搜索配置
search:
  # 启用搜索
  enable: true
  
  # 搜索类型: local | algolia
  type: "local"
  
  # 本地搜索配置
  local:
    # 触发搜索的热键
    trigger: "auto"
    
    # 搜索框占位符
    placeholder: "搜索文章..."
    
    # 是否显示顶部
    top_n_per_article: 1

# 网页访问统计
web_analytics:
  enable: true
  follow_dnt: true
  google:
    measurement_id: G-BMYB5YLKN3

# Giscus 评论系统配置
# 基于 GitHub Discussions，类似于 Utterances
# See: https://giscus.app/
giscus:
  repo: wangwanqiang/myHexoSite  # GitHub 仓库名
  repo-id: MDEwOlJlcG9zaXRvcnkxMDk0ODcyNjE=  # GitHub 仓库 ID
  category: Announcement  # Discussion 分类名
  category-id: DIC_kwDOBoaknc4C9KQO  # 分类 ID
  mapping: title  # 文章与讨论的映射关系
  reactions-enabled: 1  # 启用反应功能
  emit-metadata: 0  # 是否发送元数据
  input-position: bottom  # 评论输入框位置
  theme: light  # 主题
  lang: zh-CN  # 语言

